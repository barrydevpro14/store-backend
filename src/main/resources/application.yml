server:
  port: 8080

spring:
  application:
    name: store
  datasource:
    url: jdbc:postgresql://${URL_DATABASE:localhost:5432}/${DB_NAME:db_store}
    username: ${DB_USERNAME:barrydevit}
    password: ${DB_PASSWORD:passer}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

management:
  endpoints:
    web:
      exposure:
        include: health

security:
  jwt:
    secret: ${JWT_SECRET:ou2FiLzTm0GTFqbSGOG1kJf0Qe7kGDdOQmRU8t7Csgi35C17SSET83HMY75BS61ujph877iw8y6VEVdsMEp14A==}
    header: Authorization
    prefix: "Bearer "
    expiration:
      access-token: 1h
      refresh-token: 7d
  rbac:
    sync: ${RBAC_SYNC:false}
    file: ${RBAC_FILE:classpath:security/roles-permissions.yml}