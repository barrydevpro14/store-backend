server:
  port: 8081

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

spring:
  config:
    import: optional:classpath:email.yml
  application:
    name: store
  servlet:
    multipart:
      enabled: true
      max-file-size: 1MB
      max-request-size: 1536KB
  datasource:
    url: jdbc:postgresql://${URL_DATABASE}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: "SET client_encoding TO 'UTF8'"
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    encoding: UTF-8

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-}] %logger{36} - %msg%n"
  http:
    max-payload-length: ${LOG_HTTP_MAX_PAYLOAD_LENGTH:2048}

security:
  jwt:
    secret: ${JWT_SECRET}
    header: Authorization
    prefix: "Bearer "
    expiration:
      access-token: 1h
      refresh-token: 7d
  rbac:
    sync: ${RBAC_SYNC:false}
    file: ${RBAC_FILE:classpath:security/roles-permissions.yml}
    admin-password: ${RBAC_ADMIN_PASSWORD}

upload:
  allowed-image-types:
    - image/jpeg
    - image/png
    - image/webp
    - image/gif

subscription:
  trial-days: ${SUBSCRIPTION_TRIAL_DAYS:30}

sale:
  cancel-window-hours: ${SALE_CANCEL_WINDOW_HOURS:24}

purchase:
  cancel-window-hours: ${PURCHASE_CANCEL_WINDOW_HOURS:24}
