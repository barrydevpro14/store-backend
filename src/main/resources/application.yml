server:
  port: 8081

spring:
  application:
    name: store
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 6MB
  datasource:
    url: jdbc:postgresql://${URL_DATABASE:localhost:5432}/${DB_NAME:db_store}
    username: ${DB_USERNAME:barrydevit}
    password: ${DB_PASSWORD:passer}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: "SET client_encoding TO 'UTF8'"
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    encoding: UTF-8
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:noreply@store.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-}] %logger{36} - %msg%n"
  http:
    max-payload-length: ${LOG_HTTP_MAX_PAYLOAD_LENGTH:2048}

security:
  jwt:
    secret: ${JWT_SECRET:ou2FiLzTm0GTFqbSGOG1kJf0Qe7kGDdOQmRU8t7Csgi35C17SSET83HMY75BS61ujph877iw8y6VEVdsMEp14A==}
    header: Authorization
    prefix: "Bearer "
    expiration:
      access-token: 1h
      refresh-token: 7d
  rbac:
    sync: ${RBAC_SYNC:false}
    file: ${RBAC_FILE:classpath:security/roles-permissions.yml}
    admin-password: ${RBAC_ADMIN_PASSWORD:passer123}

upload:
  allowed-image-types:
    - image/jpeg
    - image/png
    - image/webp
    - image/gif

subscription:
  trial-days: ${SUBSCRIPTION_TRIAL_DAYS:30}

sale:
  cancel-window-hours: ${SALE_CANCEL_WINDOW_HOURS:24}

purchase:
  cancel-window-hours: ${PURCHASE_CANCEL_WINDOW_HOURS:24}