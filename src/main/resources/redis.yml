# Configuration Redis + Cache applicatif.
# Fichier importé depuis application.yml via `spring.config.import: classpath:redis.yml`.
# Override possible via variables d'env : REDIS_HOST, REDIS_PORT, REDIS_PASSWORD,
# REDIS_DATABASE, SPRING_CACHE_TYPE.
spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      database: ${REDIS_DATABASE:0}
  cache:
    type: ${SPRING_CACHE_TYPE:redis}
