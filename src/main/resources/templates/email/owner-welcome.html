<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{{subject}}</title>
  <style>
    body { margin:0; padding:0; background:#f4f6fb; font-family:'Segoe UI',Arial,sans-serif; }
    .wrapper { max-width:560px; margin:40px auto; background:#ffffff; border-radius:10px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.08); }
    .header { background:#2563eb; padding:32px 40px; text-align:center; }
    .header h1 { margin:0; color:#ffffff; font-size:22px; font-weight:700; letter-spacing:-.3px; }
    .header p { margin:8px 0 0; color:#bfdbfe; font-size:14px; }
    .body { padding:36px 40px; color:#1e293b; }
    .body p { margin:0 0 16px; font-size:15px; line-height:1.6; }
    .credentials { background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:16px 20px; margin:20px 0; }
    .credentials table { width:100%; border-collapse:collapse; }
    .credentials td { padding:6px 0; font-size:14px; }
    .credentials td:first-child { color:#64748b; width:110px; }
    .credentials td:last-child { font-weight:600; color:#1e293b; font-family:monospace; }
    .btn { display:inline-block; margin:20px 0; padding:12px 28px; background:#2563eb; color:#ffffff; text-decoration:none; border-radius:7px; font-size:15px; font-weight:600; }
    .footer { background:#f1f5f9; padding:18px 40px; text-align:center; font-size:12px; color:#94a3b8; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>{{appName}}</h1>
    <p>{{entrepriseName}}</p>
  </div>
  <div class="body">
    <p>{{greeting}}</p>
    <p>{{intro}}</p>
    <div class="credentials">
      <table>
        <tr>
          <td>{{labelUsername}}</td>
          <td>{{username}}</td>
        </tr>
      </table>
    </div>
    <p>{{ctaText}}</p>
    <a class="btn" href="{{loginUrl}}">{{btnLabel}}</a>
    <p style="font-size:13px;color:#64748b;margin-top:24px;">{{footer}}</p>
  </div>
</div>
</body>
</html>
