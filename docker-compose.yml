services:
  postgres:
    image: postgres:15-alpine
    container_name: store-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-db_store}
      POSTGRES_USER: ${DB_USERNAME:-barrydevit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-passer}
    ports:
      - "5432:5432"
    volumes:
      - store-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-barrydevit} -d ${DB_NAME:-db_store}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: store-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - store-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  store-postgres-data:
  store-redis-data:
