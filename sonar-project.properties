# Configuration SonarQube pour le projet store-backend.
# Format officiel Sonar (key=value), lu par :
#   - le scanner CLI standalone (sonar-scanner) automatiquement
#   - mvn sonar:sonar  via properties-maven-plugin (chargé en phase initialize)
#
# Override possible à l'exécution :  mvn sonar:sonar -Dsonar.projectKey=autre
#
# Doc complète : docs/SONAR.md

# --- Identification du projet ---
sonar.projectKey=store-backend
sonar.projectName=Store Backend

# --- Serveur Sonar ---
sonar.host.url=http://localhost:9000

# --- Localisation des sources et binaires ---
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# --- Couverture des tests (JaCoCo) ---
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# --- Encodage ---
sonar.sourceEncoding=UTF-8
